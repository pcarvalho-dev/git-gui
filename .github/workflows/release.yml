name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        run: npm test

      - name: Run backend tests
        working-directory: src-tauri
        run: cargo test

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev squashfs-tools

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build -- --bundles deb,appimage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/deb/*.sig
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.sig

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-installers
          path: artifacts/linux

      - name: Get version from tauri.conf.json
        id: version
        run: echo "VERSION=$(jq -r .version src-tauri/tauri.conf.json)" >> $GITHUB_OUTPUT

      - name: Generate latest.json for updater
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="latest"
          fi

          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          # Windows NSIS
          WIN_FILE=$(find artifacts/windows -name "*-setup.exe" -type f | head -1)
          if [ -z "$WIN_FILE" ]; then
            WIN_FILE=$(find artifacts/windows -name "*.exe" -type f | head -1)
          fi
          WIN_SIG_FILE="${WIN_FILE}.sig"
          WIN_FILENAME=$(basename "$WIN_FILE" | sed 's/ /./g')
          WIN_SIG=""
          if [ -f "$WIN_SIG_FILE" ]; then WIN_SIG=$(cat "$WIN_SIG_FILE"); fi

          # Linux AppImage
          LINUX_FILE=$(find artifacts/linux -name "*.AppImage" -type f | head -1)
          LINUX_SIG_FILE="${LINUX_FILE}.sig"
          LINUX_FILENAME=$(basename "$LINUX_FILE" | sed 's/ /./g')
          LINUX_SIG=""
          if [ -f "$LINUX_SIG_FILE" ]; then LINUX_SIG=$(cat "$LINUX_SIG_FILE"); fi

          # Linux .deb
          DEB_FILE=$(find artifacts/linux -name "*.deb" -type f | head -1)
          DEB_FILENAME=$(basename "$DEB_FILE" | sed 's/ /./g')

          cat > artifacts/latest.json << EOFJSON
          {
            "version": "${VERSION}",
            "notes": "Nova versao disponivel",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "${BASE_URL}/${WIN_FILENAME}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE_URL}/${LINUX_FILENAME}"
              },
              "linux-deb-x86_64": {
                "url": "${BASE_URL}/${DEB_FILENAME}"
              }
            }
          }
          EOFJSON

          echo "Generated latest.json:"
          cat artifacts/latest.json

      - name: Delete existing latest release assets
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest --repo ${{ github.repository }} --json assets -q '.assets[].name' 2>/dev/null | while read -r asset; do
            gh release delete-asset latest "$asset" --repo ${{ github.repository }} -y 2>/dev/null || true
          done

      - name: Create Release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows/**/*.exe
            artifacts/windows/**/*.msi
            artifacts/windows/**/*.sig
            artifacts/linux/**/*.deb
            artifacts/linux/**/*.AppImage
            artifacts/linux/**/*.sig
            artifacts/latest.json
          generate_release_notes: true

      - name: Create Latest Release (main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          files: |
            artifacts/windows/**/*.exe
            artifacts/windows/**/*.msi
            artifacts/windows/**/*.sig
            artifacts/linux/**/*.deb
            artifacts/linux/**/*.AppImage
            artifacts/linux/**/*.sig
            artifacts/latest.json
          body: |
            Build automatica da branch main.
            Commit: ${{ github.sha }}
            Versao: ${{ steps.version.outputs.VERSION }}
